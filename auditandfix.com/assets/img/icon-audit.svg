<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Audit&amp;Fix">
  <!-- Soft shadow disc -->
  <circle cx="40" cy="43" r="30" fill="rgba(0,0,0,0.08)"/>
  <!-- Magnifying glass circle — filled with slight tint -->
  <circle cx="38" cy="38" r="22" fill="#1e4a8a" opacity="0.15"/>
  <circle cx="38" cy="38" r="22" fill="none" stroke="#e05d26" stroke-width="5"/>
  <!-- Handle -->
  <line x1="54" y1="54" x2="68" y2="68" stroke="#e05d26" stroke-width="5" stroke-linecap="round"/>
  <!-- Tick inside glass -->
  <polyline points="27,38 34,45 50,28" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
