<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Audit&amp;Fix">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#1a365d"/>
  <!-- Magnifying glass circle -->
  <circle cx="13" cy="13" r="7.5" fill="none" stroke="#e05d26" stroke-width="2.5"/>
  <!-- Handle -->
  <line x1="18.5" y1="18.5" x2="25" y2="25" stroke="#e05d26" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tick inside glass -->
  <polyline points="9,13 12,16 18,9" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
