<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 48" width="210" height="48" role="img" aria-label="Audit&amp;Fix">
  <!-- Magnifying glass icon -->
  <circle cx="18" cy="18" r="11" fill="none" stroke="#e05d26" stroke-width="3.5"/>
  <line x1="26" y1="26" x2="34" y2="34" stroke="#e05d26" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Tick mark inside glass -->
  <polyline points="12,18 16,22 24,13" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark as single text element to avoid inter-word gaps -->
  <text y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan x="44" fill="#ffffff">Audit</tspan><tspan fill="#e05d26">&amp;</tspan><tspan fill="#ffffff">Fix</tspan>
  </text>
</svg>
