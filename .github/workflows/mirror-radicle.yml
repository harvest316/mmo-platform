name: Mirror to Radicle

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rad CLI
        # To upgrade: update RAD_VERSION + RAD_SHA256 from https://files.radicle.xyz/releases/
        env:
          RAD_VERSION: 1.7.1
          RAD_SHA256: 37980a3b7660704007c3fa100bb6aa452ffb3cd13426fbf0f4f824f8f49bca95
        run: |
          curl -fsSL "https://files.radicle.xyz/releases/${RAD_VERSION}/radicle-${RAD_VERSION}-x86_64-unknown-linux-musl.tar.xz" \
            -o radicle.tar.xz
          echo "${RAD_SHA256}  radicle.tar.xz" | sha256sum -c
          tar -xJf radicle.tar.xz
          sudo mv radicle-*/bin/rad /usr/local/bin/rad
          rad --version

      - name: Set up Radicle identity
        # Secrets to create in GitHub repo settings (Settings → Secrets → Actions):
        #
        #   RAD_PASSPHRASE    — passphrase used when running `rad auth` on k7
        #   RAD_KEY_PRIVATE   — base64-encoded private key file from ~/.radicle/keys/<alias>
        #   RAD_KEY_PUBLIC    — base64-encoded public key file from ~/.radicle/keys/<alias>.pub
        #
        # To export keys on k7 (run from host terminal):
        #   KEY=$(ls ~/.radicle/keys/ | grep -v '.pub' | head -1)
        #   cat ~/.radicle/keys/$KEY | base64 -w0     → RAD_KEY_PRIVATE
        #   cat ~/.radicle/keys/$KEY.pub | base64 -w0 → RAD_KEY_PUBLIC
        env:
          RAD_PASSPHRASE: ${{ secrets.RAD_PASSPHRASE }}
          RAD_KEY_PRIVATE: ${{ secrets.RAD_KEY_PRIVATE }}
          RAD_KEY_PUBLIC: ${{ secrets.RAD_KEY_PUBLIC }}
        run: |
          mkdir -p ~/.radicle/keys
          echo "$RAD_KEY_PRIVATE" | base64 -d > ~/.radicle/keys/github-mirror
          echo "$RAD_KEY_PUBLIC"  | base64 -d > ~/.radicle/keys/github-mirror.pub
          chmod 600 ~/.radicle/keys/github-mirror
          echo "$RAD_PASSPHRASE" | rad auth --stdin --alias github-mirror \
            --key ~/.radicle/keys/github-mirror 2>/dev/null || true

      - name: Push to Radicle seed
        # RAD_RID — the Repository ID from `rad .` (run in this repo on k7 after `rad init`)
        env:
          RAD_RID: ${{ secrets.RAD_RID }}
        run: |
          rad push --seed seed.radicle.garden --rid "$RAD_RID" --force
