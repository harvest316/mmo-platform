name: Mirror to Radicle

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rad CLI
        # To upgrade: update RAD_VERSION + RAD_SHA256 from https://files.radicle.xyz/releases/
        env:
          RAD_VERSION: 1.7.1
          RAD_SHA256: 37980a3b7660704007c3fa100bb6aa452ffb3cd13426fbf0f4f824f8f49bca95
        run: |
          curl -fsSL "https://files.radicle.xyz/releases/${RAD_VERSION}/radicle-${RAD_VERSION}-x86_64-unknown-linux-musl.tar.xz" \
            -o radicle.tar.xz
          echo "${RAD_SHA256}  radicle.tar.xz" | sha256sum -c
          tar -xJf radicle.tar.xz
          sudo mv radicle-*/bin/rad /usr/local/bin/rad
          sudo mv radicle-*/bin/radicle-node /usr/local/bin/radicle-node
          sudo mv radicle-*/bin/git-remote-rad /usr/local/bin/git-remote-rad
          rad --version

      - name: Set up Radicle identity
        # Secrets required in GitHub repo Settings → Secrets → Actions:
        #
        #   RAD_PASSPHRASE    — passphrase (leave unset if key has no passphrase)
        #   RAD_KEY_PRIVATE   — base64-encoded private key from ~/.radicle/keys/<alias>
        #   RAD_KEY_PUBLIC    — base64-encoded public key from ~/.radicle/keys/<alias>.pub
        #   RAD_RID           — Repository ID from `rad .` on k7 (e.g. rad:z2x1vb...)
        #
        # Export keys on k7:
        #   KEY=$(ls ~/.radicle/keys/ | grep -v '\.pub' | head -1)
        #   cat ~/.radicle/keys/$KEY | base64 -w0     → RAD_KEY_PRIVATE
        #   cat ~/.radicle/keys/$KEY.pub | base64 -w0 → RAD_KEY_PUBLIC
        env:
          RAD_PASSPHRASE: ${{ secrets.RAD_PASSPHRASE }}
          RAD_KEY_PRIVATE: ${{ secrets.RAD_KEY_PRIVATE }}
          RAD_KEY_PUBLIC: ${{ secrets.RAD_KEY_PUBLIC }}
        run: |
          mkdir -p ~/.radicle/keys
          echo "$RAD_KEY_PRIVATE" | base64 -d > ~/.radicle/keys/github-mirror
          echo "$RAD_KEY_PUBLIC"  | base64 -d > ~/.radicle/keys/github-mirror.pub
          chmod 600 ~/.radicle/keys/github-mirror
          rad auth --alias github-mirror \
            --key ~/.radicle/keys/github-mirror <<< "$RAD_PASSPHRASE"
          rad config init --alias github-mirror 2>/dev/null || true

      - name: Push to Radicle seed
        env:
          RAD_RID: ${{ secrets.RAD_RID }}
        run: |
          # Configure the rad remote so git push rad knows which repo this is
          git remote add rad "rad://${RAD_RID}" 2>/dev/null || \
            git remote set-url rad "rad://${RAD_RID}"
          git config rad.seed seed.radicle.garden

          # Start node in background (required for git push rad transport)
          radicle-node --listen 0.0.0.0:8776 &
          NODE_PID=$!
          sleep 3

          # Push and sync to seed
          git push rad main --force
          rad sync --seed seed.radicle.garden

          # Clean up
          kill $NODE_PID 2>/dev/null || true
