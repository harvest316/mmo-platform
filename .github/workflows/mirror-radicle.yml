name: Mirror to Radicle

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      RAD_PASSPHRASE: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rad CLI
        # To upgrade: update RAD_VERSION + RAD_SHA256 from https://files.radicle.xyz/releases/
        env:
          RAD_VERSION: 1.7.1
          RAD_SHA256: 37980a3b7660704007c3fa100bb6aa452ffb3cd13426fbf0f4f824f8f49bca95
        run: |
          curl -fsSL "https://files.radicle.xyz/releases/${RAD_VERSION}/radicle-${RAD_VERSION}-x86_64-unknown-linux-musl.tar.xz" \
            -o radicle.tar.xz
          echo "${RAD_SHA256}  radicle.tar.xz" | sha256sum -c
          tar -xJf radicle.tar.xz
          sudo mv radicle-*/bin/rad /usr/local/bin/rad
          sudo mv radicle-*/bin/radicle-node /usr/local/bin/radicle-node
          sudo mv radicle-*/bin/git-remote-rad /usr/local/bin/git-remote-rad
          rad --version

      - name: Set up Radicle identity
        # Secrets required in GitHub repo Settings → Secrets → Actions:
        #
        #   RAD_KEYGEN_SEED  — 64-char hex string; generates a deterministic keypair
        #                      so the same DID is used every run. Generate once:
        #                        openssl rand -hex 32
        #                      Store the same value in all repos.
        #   RAD_RID          — Repository ID from `rad .` on k7
        #   RAD_COB_BUNDLE   — base64-encoded git bundle of identity refs (~4KB)
        #                      Generated on k7 with:
        #                        K7_DID=$(rad self --nid | sed 's/^/did:key:/')
        #                        RID=$(rad . --rid)
        #                        git -C ~/.radicle/storage/${RID} bundle create /tmp/cob.bundle \
        #                          $(git -C ~/.radicle/storage/${RID} for-each-ref \
        #                            --format="%(refname)" \
        #                            "refs/namespaces/${K7_DID}/refs/rad/" \
        #                            "refs/namespaces/${K7_DID}/refs/cobs/" \
        #                            "refs/rad/")
        #                        base64 -w0 /tmp/cob.bundle | gh secret set RAD_COB_BUNDLE
        #
        # One-time k7 setup (run once after generating RAD_KEYGEN_SEED):
        #   RAD_KEYGEN_SEED=<seed> RAD_PASSPHRASE="" rad auth --alias github-ci
        #   rad self   # note the DID
        #   # In each repo dir:
        #   SKIP_SIMPLE_GIT_HOOKS=1 rad id update --title "Add CI delegate" --delegate <DID>
        env:
          RAD_KEYGEN_SEED: ${{ secrets.RAD_KEYGEN_SEED }}
        run: |
          rad auth --alias github-ci

      - name: Push to Radicle seed
        env:
          RAD_RID: ${{ secrets.RAD_RID }}
          RAD_COB_BUNDLE: ${{ secrets.RAD_COB_BUNDLE }}
        run: |
          trap 'kill $NODE_PID 2>/dev/null || true' EXIT

          # Restore COB bundle — provides identity data git-remote-rad needs before push
          # Must happen before radicle-node starts so node sees storage on init
          mkdir -p "${HOME}/.radicle/storage/${RAD_RID}"
          git -C "${HOME}/.radicle/storage/${RAD_RID}" init --bare --quiet
          echo "${RAD_COB_BUNDLE}" | base64 -d | \
            git -C "${HOME}/.radicle/storage/${RAD_RID}" bundle unbundle /dev/stdin

          git remote add rad "rad://${RAD_RID}" 2>/dev/null || \
            git remote set-url rad "rad://${RAD_RID}"

          # seed.radicle.garden = iris.radicle.xyz (NID from https://seed.radicle.garden/api/v1/node)
          SEED_NID="z6MkrLMMsiPWUcNPHcRajuMi9mDfYckSoJyPwwnknocNYPm7"
          git config rad.seed seed.radicle.garden

          radicle-node --listen 0.0.0.0:8776 &
          NODE_PID=$!

          # Wait for node to bind its port (up to 10s)
          for i in $(seq 1 20); do
            nc -z 0.0.0.0 8776 2>/dev/null && break
            sleep 0.5
          done
          nc -z 0.0.0.0 8776 2>/dev/null || { echo "radicle-node failed to start"; exit 1; }

          # Give bootstrap peers time to connect (iris must be in routing table for announce)
          sleep 5

          git push rad main --force || exit 1

          # Announce to iris — CI runner has a public IP so iris can inbound-fetch
          rad sync --announce --seed "${SEED_NID}"
